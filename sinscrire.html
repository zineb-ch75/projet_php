<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - GreenMarket</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
            font-family: Arial, sans-serif;
        }

        .register-card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            padding: 30px;
            background: white;
        }

        h2 {
            color: #198754;
            font-weight: bold;
        }

        .btn-green {
            background-color: #198754;
            color: white;
            border: none;
        }

        .btn-green:hover {
            background-color: #146c43;
            color: white;
        }

        .login-link a {
            text-decoration: none;
            color: #198754;
            font-weight: 500;
        }

        .login-link a:hover {
            text-decoration: underline;
        }
        .navbar {
            background-color: #198754;
            
        }
        .navbar-brand,
        .nav-link {
            color: white ;
            font-weight: 600;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="#">
    <img src="imagines/logo.jpg" 
         alt="Logo GreenMarket"
         width="50"
         height="50"
         class="rounded-circle"
         >

    <span>GreenMarket</span>
</a>

            <button class="navbar-toggler bg-white" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="acceuil.html">Accueil</a></li>
                    <li class="nav-item"><a class="nav-link" href="boutique.html">Boutiques</a></li>
                    <li class="nav-item"><a class="nav-link" href="panier.html">Panier</a></li>
                    <li class="nav-item"><a class="nav-link" href="connexion.html">Connexion</a></li>
                </ul>
            </div>
        </div>
    </nav>
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="register-card">
                <h2 class="text-center mb-4">Créer un compte</h2>

                <form>

                    <!-- Nom -->
                    <div class="mb-3">
                        <label class="form-label">Nom</label>
                        <input type="text" class="form-control" placeholder="Entrer votre nom">
                    </div>

                    <!-- Prénom -->
                    <div class="mb-3">
                        <label class="form-label">Prénom</label>
                        <input type="text" class="form-control" placeholder="Entrer votre prénom">
                    </div>

                    <!-- Email -->
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" placeholder="Entrer votre email">
                    </div>

                    <!-- Mot de passe -->
                    <div class="mb-3">
                        <label class="form-label">Mot de passe</label>
                        <input type="password" class="form-control" placeholder="Créer un mot de passe">
                    </div>

                    <!-- Vérifier mot de passe -->
                    <div class="mb-3">
                        <label class="form-label">Vérifier le mot de passe</label>
                        <input type="password" class="form-control" placeholder="Confirmer le mot de passe">
                    </div>

                    <!-- Bouton -->
                    <a href="acceuil.html" class="btn btn-green w-100">
                        S'inscrire
                        </a>
                    

                    <!-- Retour connexion -->
                    <div class="text-center mt-4 login-link">
                        <p>
                            Vous avez déjà un compte ?
                            <a href="connexion.html">Se connecter</a>
                        </p>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="sinscrire.js"></script>
</body>
</html>
