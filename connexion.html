
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - GreenMarket</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .login-card {
            border: none;
            border-radius: 15px;
        }

        .toggle-password {
            cursor: pointer;
        }

        .extra-links a {
            text-decoration: none;
            color: #198754;
            font-weight: 500;
        }

        .extra-links a:hover {
            text-decoration: underline;
        }
        .navbar {
            background-color: #198754;
        }
         .navbar-brand,
        .nav-link {
            color: white ;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="#">
    <img src="imagines/logoo.jpeg" 
         alt="Logo GreenMarket"
         width="50"
         height="50"
         class="rounded-circle"
         >
    <span>GreenMarket</span>
</a>
            <button class="navbar-toggler bg-white" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="acceuil.html">Accueil</a></li>
                    <li class="nav-item"><a class="nav-link" href="boutique.html">Boutiques</a></li>
                    <li class="nav-item"><a class="nav-link" href="panier.html">🛒</a></li>
                    <li class="nav-item"><a class="nav-link" href="connexion.html">Connexion</a></li>
                </ul>
            </div>
        </div>
    </nav>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">

            <div class="card shadow login-card p-4">
                <h2 class="text-center mb-4">Connexion</h2>

                <form>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" placeholder="Entrer votre email">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Mot de passe</label>

                        <div class="input-group">
                            <input 
                                type="password" 
                                class="form-control" 
                                id="password"
                                placeholder="Entrer votre mot de passe"
                            >

                            <button 
                                class="btn btn-outline-secondary toggle-password" 
                                type="button"
                                onclick="togglePassword()"
                            >
                                👁
                            </button>
                        </div>
                    </div>
<div class="mb-4">

    <label class="form-label fw-bold">
        Vous êtes :
    </label>

    <div class="form-check">
        <input 
            class="form-check-input"
            type="radio"
            name="role"
            id="client"
            value="client"
            checked
        >

        <label class="form-check-label" for="client">
            Client
        </label>
    </div>

    <div class="form-check">
        <input 
            class="form-check-input"
            type="radio"
            name="role"
            id="producteur"
            value="producteur"
        >

        <label class="form-check-label" for="producteur">
            Producteur
        </label>
    </div>

</div>
                    <div class="mb-3 text-end extra-links">
                        <a href="mtp.html">Mot de passe oublié ?</a>
                    </div>
                    <button class="btn btn-success w-100">
                        Se connecter
                    </button>
                    <div class="text-center mt-4 extra-links">
                        <p>
                            Pas encore de compte ?
                            <a href="sinscrire.html">S'inscrire</a>
                        </p>
                    </div>

                </form>
            </div>

        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="connexion.js"></script>
</body>
</html>
